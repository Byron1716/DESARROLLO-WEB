{% extends "base.html" %}

{% block title %}Iniciar sesión · Clínica SaluVida{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-4 text-center">Iniciar sesión</h2>

    <form method="post" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label for="usuario" class="form-label">Usuario</label>
        <input
          type="text"
          class="form-control"
          id="usuario"
          name="usuario"
          required
        >
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          required
        >
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">
          Iniciar sesión
        </button>
      </div>
    </form>

    <p class="mt-3 text-center">
      ¿No tienes cuenta?
      <a href="{{ url_for('registro') }}">Regístrate aquí</a>
    </p>
  </div>
</div>
{% endblock %}
